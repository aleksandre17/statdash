# Prod overlay — use: geostat infra remote up -Prod

services:
  postgres:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
