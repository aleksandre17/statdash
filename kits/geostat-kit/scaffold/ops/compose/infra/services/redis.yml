services:
  redis:
    image: redis:7-alpine
    container_name: ${INFRA_PREFIX:-app}-redis
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly ${REDIS_AOF:-yes}
    volumes:
      - redis_data:/data
    networks:
      - infra-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
