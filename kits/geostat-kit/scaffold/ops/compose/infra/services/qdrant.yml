services:
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: ${INFRA_PREFIX:-app}-qdrant
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - infra-net
    restart: unless-stopped
