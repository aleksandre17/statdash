# Per-module deploy compose (node-vite driver) — PRODUCTION overlay.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Builds the production target (nginx serving the static Vite dist) and publishes it on
# DEPLOY_HOST_PORT → container :80. VITE_API_URL is baked at build time.
services:
  statdash-geostat:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        NGINX_VERSION: ${NGINX_VERSION:-1.27-alpine}
    image: statdash-geostat
    ports:
      - "${DEPLOY_HOST_PORT:-5171}:80"
    env_file:
      - ../../../ops/config/geostat/.env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
