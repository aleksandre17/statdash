server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback — every unknown route serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Single-origin reverse proxy (ADR adr-deployment-topology, D1). The SPA calls
    # a RELATIVE base (VITE_API_STATS_URL='' → /api/...), so every api request is
    # same-origin and nginx forwards it to the INTERNAL api container — reachable
    # as `statdash-api` on statdash-net, listening on 3001 (apps/api env PORT
    # default). The api is never published to the host → no CORS, no baked origin.
    location /api/ {
        proxy_pass http://statdash-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache hashed static assets.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # frame-ancestors is the ONE CSP directive a <meta> tag cannot express, so it
    # lives here as a header (ADR D3). connect-src/script-src/etc. stay in the app's
    # meta CSP ('self', same-origin) — NOT duplicated/loosened here: a header can
    # only further-restrict a meta policy (the two intersect), never relax it.
    add_header Content-Security-Policy "frame-ancestors 'self';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA entry-point cache policy. index.html (served for `/` and every app route
    # via the try_files fallback) MUST be revalidated on every load — it references
    # the content-hashed asset bundles, so a browser-cached stale index.html pins
    # users to OLD js/css after a deploy (fixes appeared only after a manual
    # hard-refresh). This server-level header is inherited by `location /` (HTML);
    # the asset regex location below sets its OWN Cache-Control (public, immutable),
    # so nginx's add_header non-inheritance leaves hashed assets long-cached — only
    # the entry point revalidates. Standard SPA strategy.
    add_header Cache-Control "no-cache" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;
}
