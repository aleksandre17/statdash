<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Statistical Dashboard</title>
    <!--
      Content-Security-Policy baseline (Phase 9.5 [N24]).
      - style-src 'unsafe-inline': required by ApexCharts (SVG inline styles).
      - connect-src 'self': the api is SAME-ORIGIN in production (single-origin
        reverse-proxy topology — nginx serves the SPA and proxies /api/ to the
        internal api). No http origin or IP is whitelisted, and none is needed.
      - frame-ancestors: the one directive a <meta> CSP cannot express (ignored
        by spec), so it MUST live in the nginx HTTP header.
      Header vs meta — note (corrects a prior misconception): an nginx
      `Content-Security-Policy` HTTP header CANNOT loosen this meta policy. When a
      document carries multiple policies (one from meta, one from a header), the
      browser enforces EACH independently — the effective policy is their
      INTERSECTION (most-restrictive wins). A header can only further restrict,
      never relax. So a production header adds frame-ancestors /
      X-Content-Type-Options; it does not (and cannot) re-open connect-src.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https:;
      connect-src 'self' https:;
      object-src 'none';
      base-uri 'self';
      form-action 'self'
    " />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
