# pnpm workspace — replaces npm "workspaces" field in package.json.
# engine/* = published platform library packages (source-resolved in-repo, publishable).
# apps/*   = application deployables (private: true, never published).
packages:
  - 'engine/*'
  - 'apps/*'

# Catalog: single-source version pins shared across all workspace packages.
# Consumers reference these with the "catalog:" protocol in their package.json
# (e.g.  "react": "catalog:").  Update a version here — never in individual files.
catalog:
  react: '^19.2.4'
  react-dom: '^19.2.4'
  react-router-dom: '^6.22.0'
  typescript: '~5.9.3'
  vite: '^8.0.1'
  vitest: '^4.1.6'
  '@vitejs/plugin-react': '^6.0.1'
  '@types/react': '^19.2.14'
  '@types/react-dom': '^19.2.3'
  '@types/node': '^24.12.0'
  eslint: '^9.39.4'
  typescript-eslint: '^8.57.0'
  '@eslint/js': '^9.39.4'
  globals: '^17.4.0'
  tailwindcss: '^3.4.1'
  autoprefixer: '^10.4.18'
  postcss: '^8.4.35'
  jsdom: '^29.1.1'
  cross-env: '^10.1.0'
  '@testing-library/jest-dom': '^6.9.1'
  '@testing-library/react': '^16.3.2'
  '@testing-library/user-event': '^14.6.1'
  msw: '^2.13.0'
  zustand: '^5.0.0'
  '@dnd-kit/core': '^6.0.0'
  '@dnd-kit/sortable': '^8.0.0'
  '@dnd-kit/utilities': '^3.2.0'
  fastify: '^5.0.0'
  '@fastify/cors': '^10.0.0'
  '@fastify/postgres': '^6.0.0'
  fastify-plugin: '^5.0.0'
  zod: '^3.23.0'
  dotenv: '^16.0.0'
  tsx: '^4.0.0'
  react-admin: '^5.0.0'
  '@mui/material': '^6.0.0'
  '@mui/icons-material': '^6.0.0'
  '@emotion/react': '^11.0.0'
  '@emotion/styled': '^11.0.0'
