# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml — the FULL, SELF-CONTAINED DEV LINE (statdash-dev).
#
# A third parallel line beside prod (statdash-prod) and staging (statdash-stg) on
# the SAME host (192.168.1.199), built from the feature branch, sharing NOTHING
# with either — its OWN infra + api + geostat + panel + db + network + volume +
# secrets + ports. Unlike docker-compose.dev-panel.yml (a panel-ONLY preview that
# borrows the STAGING api), this line stands up its OWN api + postgres, so it is a
# complete line, not a preview.
#
#   docker-compose -f ops/compose/docker-compose.dev.yml -p statdash-dev up -d --build
#
# ── ISOLATION (mirrors docker-compose.staging.yml; shares NOTHING w/ prod OR stg) ─
#   project        statdash-dev           (≠ statdash-prod, ≠ statdash-stg, ≠ statdash-dev-panel)
#   network        statdash-dev-net       (≠ statdash-net, ≠ statdash-stg-net, ≠ statdash-dev-panel-net)
#   volume         statdash-dev-pgdata    (≠ *-prod-pgdata-v2, ≠ *-stg-pgdata-v2)
#   containers     statdash-dev-*         (≠ statdash-*, ≠ statdash-stg-*, ≠ statdash-dev-panel)
#   images         statdash-*:dev         (≠ prod [:latest/untagged], ≠ stg :stg)
#   published      pg 5458, api 3011, geostat 3012, panel 3013
#                  (FREE block — host in-use: prod 3002/3003, stg 3007/3008/3009/5457,
#                   dev-panel 3010; verified read-only before allocation)
# It touches NO prod/staging project, network, volume, or container. Tear down with:
#   docker-compose -f ops/compose/docker-compose.dev.yml -p statdash-dev down
#   (NEVER `down -v` — that destroys this line's DB volume; harmless to prod/stg regardless).
#
# ── SEED / DATA STRATEGY (ADR-035 root-cause fix — fresh uncapped boot works) ──
# SEED NEUTRALIZED, exactly like staging: flyway mounts ONLY /flyway/sql and
# -locations names ONLY it → the R__ gold seed never runs → gold starts EMPTY of
# observations. Flyway now runs UNCAPPED (V1→V38): the former `-target=32` defect —
# a fresh volume dying at V33 — is FIXED by the beforeEachMigrate.sql callback, which
# seeds the geo/sector/account STRUCTURAL codelist members (SDMX codelists are
# structure, V7's own law) BEFORE V33. So V33 §7 passes and its §4/§6 corrections
# land, V34 widens GDP to the canonical 4-dim DSD, V35..V38 apply — a deterministic
# fresh-from-zero boot to V38. (The old note: V33 died "expected >=11 regions
# parented to _T, found 0" because R2..R12 were minted only by ingest; the callback
# moves those members to structure, dissolving both that RAISE and the V37
# `claimed_at` interleave trap.)
# CONSEQUENCE: this line boots deterministically green to V38 and is FULLY LIVE (own
# db + api + geostat + panel) with the AR-49 metric-first AUTHORING surface fully
# exercised; the observation cube starts EMPTY (map/KPIs render their shell). To load
# the real demo data, run the now-COLLAPSED bring-up: ops/scripts/bringup-fresh.sh
# (ADR-035) = `flyway migrate (uncapped) → ingest (all 3 workbooks, additive)`, no
# -target cap, no ingest split. Point it at this line's pg (5458) + api (3011); the
# classifier members converge (identical labels ⇒ no SCD-2 churn), facts land, GDP is
# 4-dim, idempotent. (A future step may fold that ingest into a compose one-shot.)
#
# Boot order (depends_on + healthchecks): pg healthy → flyway 0 → api healthy →
# geostat/panel start.
# ─────────────────────────────────────────────────────────────────────────────

name: statdash-dev

services:
  # ── Dev PostgreSQL — PUBLISHED on 5458 (throwaway; own isolated volume) ────────
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: statdash-dev-pg
    environment:
      POSTGRES_DB: statdash
      POSTGRES_USER: statdash
      # Throwaway dev secret — this line is reversible and never holds real data.
      POSTGRES_PASSWORD: dev_throwaway_db_pw
    ports:
      - "5458:5432"
    volumes:
      # Spilo (timescaledb-ha) real data dir = PGDATA=/home/postgres/pgdata/data.
      # Mount the PGROOT or data lives in the writable layer (recreate = wipe).
      # Mirrors the prod fix (ADR adr-postgres-persistent-volume).
      - dev_pgdata:/home/postgres/pgdata
    networks:
      - statdash-dev-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statdash -d statdash"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Flyway — V1→V38 UNCAPPED (SEED NEUTRALIZED). Runs once, exits 0. ──────────
  # The former `-target=32` cap is GONE (ADR-035 root-cause fix): the co-located
  # beforeEachMigrate.sql callback (auto-discovered from the mounted /flyway/sql
  # locations) seeds the geo/sector/account STRUCTURAL codelist members before V33,
  # so a fresh uncapped migrate now reaches V38 clean (V33 §7 passes; §4/§6 land).
  # The callback is checksum-neutral (not in the version chain) and a no-op on an
  # already-migrated DB, so this same command is safe on prod/staging.
  flyway:
    image: flyway/flyway:10-alpine
    container_name: statdash-dev-flyway
    command: >-
      -url=jdbc:postgresql://postgres:5432/statdash
      -user=statdash
      -password=dev_throwaway_db_pw
      -locations=filesystem:/flyway/sql
      -placeholderReplacement=false
      migrate
    volumes:
      - ../postgres/migrations:/flyway/sql:ro
    networks:
      - statdash-dev-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── API — PUBLISHED on 3011 (throwaway). Built from the branch. ────────────────
  # Network ALIAS `statdash-api`: the geostat/panel images bake nginx `proxy_pass
  # http://statdash-api:3001`. The alias makes that baked name resolve to THIS dev
  # api — but ONLY on statdash-dev-net (never prod/stg nets), so single-origin /api
  # works with zero image/nginx changes and zero cross-line impact.
  api:
    image: statdash-api:dev
    container_name: statdash-dev-api
    build:
      context: ../../platform
      dockerfile: apps/api/Dockerfile
    environment:
      PORT: "3001"
      HOST: 0.0.0.0
      NODE_ENV: production
      # Same-origin via the geostat/panel nginx proxy → CORS off. The direct-3011
      # curl path is not a browser, needs no CORS. Parity with prod/staging.
      CORS_ORIGIN: "false"
      DATABASE_URL: postgres://statdash:dev_throwaway_db_pw@postgres:5432/statdash
      # Throwaway dev secrets (>=32 / >=8 chars per env.ts fail-fast gates).
      JWT_SECRET: dev_throwaway_jwt_secret_min_32_chars_xx
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: dev_admin_pw_123
      EMBED_SECRET: dev_throwaway_embed_secret_min_32_chr_yy
      PROVISIONING_DIR: ./provisioning
      PROVISIONING_DRY_RUN: "false"
    ports:
      - "3011:3001"
    networks:
      statdash-dev-net:
        aliases:
          - statdash-api
    depends_on:
      postgres:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── geostat SPA + reverse proxy — PUBLISHED on 3012. Built from the branch. ────
  # Built with EMPTY VITE_API_URL / VITE_API_STATS_URL → relative /api base; baked
  # nginx proxies /api/ → statdash-api:3001, resolved to statdash-dev-api by the alias.
  geostat:
    image: statdash-geostat:dev
    container_name: statdash-dev-geostat
    build:
      context: ../../platform
      dockerfile: apps/geostat/Dockerfile
      target: production
      args:
        VITE_API_URL: ""
        VITE_API_STATS_URL: ""
    ports:
      - "3012:80"
    networks:
      - statdash-dev-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── panel (Constructor / AR-49 authoring) SPA + reverse proxy — PUBLISHED 3013 ─
  # Supersedes the standalone docker-compose.dev-panel.yml (3010, staging-api-backed):
  # this panel is backed by THIS line's OWN dev api (statdash-dev-api), not staging's.
  panel:
    image: statdash-panel:dev
    container_name: statdash-dev-panel-full
    build:
      context: ../../platform
      dockerfile: apps/panel/Dockerfile
      target: production
      args:
        VITE_API_URL: ""
    ports:
      - "3013:80"
    networks:
      - statdash-dev-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  statdash-dev-net:
    name: statdash-dev-net

volumes:
  dev_pgdata:
    name: statdash-dev-pgdata
