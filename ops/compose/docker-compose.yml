# App stack base — geostat-app (+ panel in Phase 3).
# Requires infra stack running first:
#   docker compose -f ops/compose/infra/docker-compose.base.yml \
#                  -f ops/compose/infra/services/postgres.yml \
#                  [-f ops/compose/infra/services/pgadmin.yml] up -d
# Then:
#   docker compose -f ops/compose/docker-compose.yml up  (dev, auto-merges override)

name: statdash

services:
  geostat-app:
    image: geostat-app
    container_name: geostat-app
    build:
      context: ../../platform
      dockerfile: apps/geostat/Dockerfile
    networks:
      - statdash-net
    mem_limit: 128m
    cpus: 0.5

  statdash-api:
    image: statdash-api
    container_name: statdash-api
    build:
      context: ../../platform
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-3001}:3001"
    env_file:
      - ../config/api/.env
    networks:
      - statdash-net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  statdash-net:
    name: statdash-net
