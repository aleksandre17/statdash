# Dev — auto-merged on: docker compose -f ops/compose/docker-compose.yml up
services:
  geostat-app:
    build:
      target: development
    ports:
      - "${DEPLOY_HOST_PORT:-5171}:5171"
    volumes:
      - ../../platform:/app
      - /app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-}
    env_file:
      - ../config/geostat/.env.dev
    develop:
      watch:
        - action: sync
          path: ../../platform/apps/geostat/src
          target: /app/apps/geostat/src
        - action: rebuild
          path: ../../platform/apps/geostat/package.json
