# Production app overlay
# Usage: docker compose -f ops/compose/docker-compose.yml -f ops/compose/docker-compose.prod.yml up -d
services:
  geostat-app:
    build:
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    ports:
      - "${DEPLOY_HOST_PORT:-5171}:80"
    env_file:
      - ../config/geostat/.env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
