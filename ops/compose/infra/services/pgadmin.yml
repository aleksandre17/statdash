# pgAdmin — dev only. Do NOT include in prod.
services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${INFRA_PREFIX:-statdash}-pgadmin
    ports:
      - "127.0.0.1:${PGADMIN_LISTEN_PORT:-5050}:80"
    env_file:
      - ../../config/db/.env
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - infra-net
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 256m
    restart: unless-stopped
