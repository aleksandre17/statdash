# pgBouncer — transaction-pooled connection multiplexer in front of Postgres.
# App services connect here (6432) instead of Postgres directly (5432) so a
# burst of short-lived clients shares a small server-side pool.
#
# Usage (dev):
#   docker compose \
#     -f ops/compose/infra/docker-compose.base.yml \
#     -f ops/compose/infra/services/postgres.yml \
#     -f ops/compose/infra/services/pgbouncer.yml \
#     up -d
services:
  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: ${INFRA_PREFIX:-statdash}-pgbouncer
    ports:
      - "127.0.0.1:${PGBOUNCER_PORT:-6432}:5432"
    environment:
      DB_HOST: ${INFRA_PREFIX:-statdash}-postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-statdash}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-statdash}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "100"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    networks:
      - infra-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped
    # RAM: ~16MB. App services still use direct Postgres (5432) until the rewire.
