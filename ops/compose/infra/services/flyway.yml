# Flyway — versioned schema migrations. The canonical schema source.
# Runs `migrate` once Postgres is healthy, then exits 0 (restart: on-failure
# retries only on error). Re-running is safe: Flyway skips already-applied
# versions via its schema_history table.
#
# Usage (dev):
#   docker compose \
#     -f ops/compose/infra/docker-compose.base.yml \
#     -f ops/compose/infra/services/postgres.yml \
#     -f ops/compose/infra/services/flyway.yml \
#     up -d
services:
  flyway:
    image: flyway/flyway:10-alpine
    container_name: statdash-flyway
    # ONE location: the versioned schema (Vnn, ops/postgres/migrations). The R__ gold
    # seed (ops/postgres/seed) is NO LONGER mounted/listed (ADR-0032 neutralization) —
    # it is a stale (pre-canonical, 3-dim GDP) generated parity twin that, since
    # migration V34 widened GDP_ANNUAL's DSD to the canonical 4-dim
    # [measure, approach, time, geo], FAILS the V22 dim_key trigger (its 3-dim GDP
    # facts no longer match the DSD) and forks the data SSOT. The demo-data SSOT is
    # the canonical workbooks (DATA/canonical/*.xlsx), ingested through the pipeline.
    # NOTE (coordination): the bundle-based `pnpm --filter @statdash/api seed`
    # (ops/seed-data/*.bundle.json) is ALSO stale 3-dim GDP and must be regenerated
    # 4-dim (or replaced by the canonical ingest) by the seed/engine owner — see the
    # validate-local flow. placeholderReplacement=false: our migrations are static SQL.
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-statdash} -user=${POSTGRES_USER:-statdash} -password=${POSTGRES_PASSWORD} -locations=filesystem:/flyway/sql -placeholderReplacement=false migrate
    env_file:
      - ../../config/db/.env
    volumes:
      - ../../postgres/migrations:/flyway/sql:ro
    networks:
      - infra-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
